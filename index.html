<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Tier List | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0e14] text-white p-5 md:p-10">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-extrabold text-blue-500">MC<span class="text-white">TIERS</span></h1>
        <a href="admin.html" class="text-gray-500 hover:text-white text-sm">Staff Login</a>
    </div>

    <div class="max-w-4xl mx-auto glass-container rounded-xl overflow-hidden border border-gray-800 shadow-2xl">
        <table class="w-full text-left">
            <thead class="bg-gray-900/50 text-gray-400 text-sm uppercase">
                <tr>
                    <th class="p-4">Player</th>
                    <th class="p-4 text-right">Tier</th>
                </tr>
            </thead>
            <tbody id="tier-body">
                </tbody>
        </table>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
