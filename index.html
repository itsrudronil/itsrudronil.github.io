<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Tiers | Ranking & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .tier-card { transition: all 0.2s; border-bottom: 1px solid #1e293b; }
        .tier-card:hover { background-color: #1e293b; }
        input, select { transition: all 0.2s; }
        input:focus, select:focus { border-color: #3b82f6 !important; ring: 2px #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tighter">MC<span class="text-white">TIERS</span></h1>
            <input type="text" id="searchInput" placeholder="Search Player Name..." 
                class="w-full md:w-64 bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-sm outline-none">
        </div>

        <div class="mb-12 p-6 bg-slate-800/40 border border-slate-700 rounded-2xl shadow-xl">
            <h2 class="text-lg font-bold mb-4 text-blue-400 flex items-center gap-2">
                <span class="p-1 bg-blue-500/20 rounded">⚡</span> Add New Player
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="pName" placeholder="Username" class="bg-slate-900 border border-slate-700 p-2.5 rounded-lg text-sm outline-none">
                <input type="text" id="pUUID" placeholder="Minecraft UUID" class="bg-slate-900 border border-slate-700 p-2.5 rounded-lg text-sm outline-none">
                <select id="pTier" class="bg-slate-900 border border-slate-700 p-2.5 rounded-lg text-sm outline-none text-gray-300">
                    <option value="HT1">HT1 (High Tier 1)</option>
                    <option value="LT1">LT1 (Low Tier 1)</option>
                    <option value="HT2">HT2 (High Tier 2)</option>
                    <option value="LT2">LT2 (Low Tier 2)</option>
                    <option value="HT3">HT3 (High Tier 3)</option>
                </select>
                <button onclick="addPlayer()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-lg active:scale-95 transition-all">
                    Add Player
                </button>
            </div>
            <p id="statusMsg" class="mt-3 text-xs font-medium"></p>
        </div>

        <div class="grid grid-cols-3 bg-slate-800/60 p-4 rounded-t-2xl font-bold text-gray-400 text-[10px] uppercase tracking-[0.2em] border border-slate-700/50">
            <div>Player</div>
            <div class="text-center">Skill Tier</div>
            <div class="text-right">Status</div>
        </div>

        <div id="playerList" class="bg-slate-900/40 border-x border-b border-slate-800 rounded-b-2xl overflow-hidden min-h-[200px]">
            <div class="p-20 text-center text-gray-500 italic">Connecting to Database...</div>
        </div>
        
        <p class="mt-8 text-center text-gray-600 text-[10px] uppercase tracking-widest">Powered by Firebase & Tailwind</p>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        // Replace with your own Firebase details from Console
        const firebaseConfig = {
            apiKey: "AIzaSyDAmbvBXIxr4StYtg5obkL7ScKadmAluXU",
            authDomain: "tiers-a0f66.firebaseapp.com",
            projectId: "tiers-a0f66",
            storageBucket: "tiers-a0f66.firebasestorage.app",
            messagingSenderId: "394254274051",
            appId: "1:394254274051:web:b5604e1ff286b90f870836"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const playerListContainer = document.getElementById('playerList');
        const searchInput = document.getElementById('searchInput');
        const statusMsg = document.getElementById('statusMsg');

        // --- 2. ADD PLAYER FUNCTION ---
        async function addPlayer() {
            const name = document.getElementById('pName').value.trim();
            const uuid = document.getElementById('pUUID').value.trim();
            const tier = document.getElementById('pTier').value;

            if(!name || !uuid) {
                showStatus("Please enter both Name and UUID!", "#ef4444");
                return;
            }

            // Auto-color based on tier
            let tierColor = "#94a3b8"; // Default Gray
            if(tier.includes("1")) tierColor = "#ff5555"; // Red for T1
            else if(tier.includes("2")) tierColor = "#ffaa00"; // Orange for T2
            else if(tier.includes("3")) tierColor = "#55ff55"; // Green for T3

            try {
                await db.collection("players").add({
                    username: name,
                    uuid: uuid,
                    tier: tier,
                    color: tierColor,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showStatus("✅ Success! Player added to the list.", "#10b981");
                document.getElementById('pName').value = "";
                document.getElementById('pUUID').value = "";
            } catch (e) {
                showStatus("❌ Error: " + e.message, "#ef4444");
            }
        }

        function showStatus(text, color) {
            statusMsg.innerText = text;
            statusMsg.style.color = color;
            setTimeout(() => { statusMsg.innerText = ""; }, 4000);
        }

        // --- 3. FETCH & DISPLAY PLAYERS ---
        function loadData(query = "") {
            db.collection("players").orderBy("tier", "asc").onSnapshot((snapshot) => {
                playerListContainer.innerHTML = "";
                
                if (snapshot.empty) {
                    playerListContainer.innerHTML = `<div class="p-16 text-center text-gray-600">No players ranked yet.</div>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if(data.username.toLowerCase().includes(query.toLowerCase())) {
                        const row = `
                            <div class="grid grid-cols-3 p-5 items-center tier-card">
                                <div class="flex items-center gap-4">
                                    <img src="https://cravatar.eu/avatar/${data.uuid}/40.png" 
                                         class="rounded-lg border border-slate-700 bg-slate-800 shadow-lg"
                                         onerror="this.src='https://minotar.net/avatar/steve/40.png'">
                                    <span class="font-bold text-slate-200 tracking-tight">${data.username}</span>
                                </div>
                                <div class="text-center">
                                    <span class="px-4 py-1 rounded-full text-[10px] font-black tracking-widest border" 
                                          style="background-color: ${data.color}15; color: ${data.color}; border-color: ${data.color}40;">
                                        ${data.tier}
                                    </span>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">VERIFIED</span>
                                </div>
                            </div>
                        `;
                        playerListContainer.innerHTML += row;
                    }
                });
            });
        }

        // Search Listener
        searchInput.addEventListener('input', (e) => loadData(e.target.value));

        // Initial Load
        loadData();
    </script>
</body>
</html>
