<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Tiers BD | Official Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-12">

    <div class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center space-x-3">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-black text-2xl italic shadow-lg">M</div>
            <h1 class="text-2xl font-black tracking-tighter uppercase italic text-white">CTIERS <span class="text-blue-500">BD</span></h1>
        </div>
        <a href="admin.html" class="text-gray-500 hover:text-blue-400 text-[10px] font-black uppercase tracking-widest transition">Admin Login</a>
    </div>

    <div class="max-w-5xl mx-auto border border-gray-800/50 rounded-3xl overflow-hidden shadow-2xl bg-[#0b0e14]">
        <table class="w-full text-left">
            <thead>
                <tr class="bg-gray-900/80 text-gray-500 text-[10px] uppercase tracking-[0.3em] font-black border-b border-gray-800">
                    <th class="px-8 py-6">Rank & Player</th>
                    <th class="px-8 py-6 text-right">Combat Tier</th>
                </tr>
            </thead>
            <tbody id="tier-body" class="divide-y divide-gray-800/40">
                </tbody>
        </table>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
