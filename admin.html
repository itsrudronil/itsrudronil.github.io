<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MC Tiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">

    <div class="w-full max-w-lg">
        
        <div id="login-section" class="glass p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-blue-500 uppercase tracking-widest">Admin Login</h1>
                <p class="text-gray-500 text-sm mt-2">Only authorized staff can access this panel</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase font-bold">Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" 
                        class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white outline-none transition">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase font-bold">Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" 
                        class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white outline-none transition">
                </div>
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-900/20 transition-all duration-300 transform hover:scale-[1.02]">
                    Login to Dashboard
                </button>
            </div>
        </div>

        <div id="admin-panel" class="hidden glass p-8 rounded-2xl border border-blue-900 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-blue-400">Add Player</h2>
                    <p class="text-xs text-gray-500 italic">For Cracked Players (Manual Head)</p>
                </div>
                <button id="logoutBtn" class="bg-red-900/20 text-red-500 border border-red-900/50 px-3 py-1 rounded-md text-xs font-bold hover:bg-red-500 hover:text-white transition">
                    Logout
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase font-bold text-blue-500/70">Player Username</label>
                    <input type="text" id="pName" placeholder="e.g. Rudronil_OP" 
                        class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white outline-none">
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase font-bold text-blue-500/70">Assigned Tier</label>
                    <input type="text" id="pTier" placeholder="e.g. HT3 / LT1" 
                        class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white outline-none">
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase font-bold text-blue-500/70">Head Image URL</label>
                    <input type="text" id="pHead" placeholder="Direct link from Imgur/Discord" 
                        class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white outline-none">
                    <p class="text-[10px] text-gray-600 mt-1">*আপনার ওই স্ক্রিনশট বা কাস্টম ছবির ডিরেক্ট লিঙ্ক এখানে দিন।</p>
                </div>

                <button id="saveBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    Save Player to Database
                </button>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="text-gray-500 hover:text-blue-400 text-sm transition font-medium">
                &larr; Return to Public Leaderboard
            </a>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
