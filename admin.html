<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white p-10">

    <div class="max-w-lg mx-auto bg-gray-900 p-8 rounded-xl border border-blue-900">
        <h2 class="text-2xl font-bold mb-6 text-blue-400">Add Cracked Player</h2>
        
        <div class="space-y-4">
            <input type="text" id="pName" placeholder="Player IGN" class="w-full bg-black border border-gray-700 p-3 rounded">
            <input type="text" id="pTier" placeholder="Tier (e.g. HT3)" class="w-full bg-black border border-gray-700 p-3 rounded">
            <input type="text" id="pHead" placeholder="Head URL (Imgur/Discord link)" class="w-full bg-black border border-gray-700 p-3 rounded">
            
            <button id="saveBtn" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-700">Save Player</button>
        </div>
        <a href="index.html" class="block text-center mt-4 text-gray-500 underline">Back to List</a>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
