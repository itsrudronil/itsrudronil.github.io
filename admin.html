<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | MC Tiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div id="login-section" class="glass p-10 rounded-3xl border border-gray-800 shadow-2xl">
            <h2 class="text-2xl font-black text-blue-500 mb-6 uppercase text-center italic">Staff Login</h2>
            <div class="space-y-4">
                <input type="email" id="adminEmail" placeholder="Email" class="w-full bg-black/50 border border-gray-700 p-4 rounded-xl outline-none text-white">
                <input type="password" id="adminPassword" placeholder="Password" class="w-full bg-black/50 border border-gray-700 p-4 rounded-xl outline-none text-white">
                <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-4 rounded-xl transition shadow-lg shadow-blue-600/20">Authorize</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden glass p-10 rounded-3xl border border-blue-600/30 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-400 italic uppercase">Edit Ranking</h2>
                <button id="logoutBtn" class="text-xs text-red-500 font-bold border border-red-500/30 px-2 py-1 rounded">Logout</button>
            </div>
            
            <div class="space-y-4">
                <input type="number" id="pPos" placeholder="Position (e.g. 1)" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-yellow-500 font-bold">
                <input type="text" id="pName" placeholder="Player IGN" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white">
                <input type="text" id="pTier" placeholder="Points(e.g,1000)" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white">
                <input type="text" id="pMode" placeholder="Gamemode (e.g. Crystal)" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white">
                <input type="text" id="pHead" placeholder="Manual PNG Link" class="w-full bg-black/50 border border-gray-700 p-3 rounded-lg text-white">
                <button id="saveBtn" class="w-full bg-green-600 hover:bg-green-700 font-black py-4 rounded-xl transition shadow-lg">Publish Update</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
